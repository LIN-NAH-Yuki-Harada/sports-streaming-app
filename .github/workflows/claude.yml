name: Claude

# issue / PR コメントで「@claude ...」とメンションすると、
# GitHub のクラウド上で Claude が起動し、調査・実装してPRを開く/コメントを返す。
# オーナーは最終的に出てきたPRをレビュー＆マージするだけ。
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # @claude が含まれる時だけ起動（無駄な実行を防ぐ）
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          # GitHub のリポジトリ Secrets に ANTHROPIC_API_KEY を登録すると有効化される。
          # （Claude のサブスク利用なら CLAUDE_CODE_OAUTH_TOKEN に差し替え可）
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
